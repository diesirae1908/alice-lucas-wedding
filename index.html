<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alice & Lucas · 30 Juin 2026</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💍</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: #faf8f5;
      color: #1a1209;
      line-height: 1.5;
    }

    /* ── Header ─────────────────────────────────────────── */
    #site-header {
      background: linear-gradient(135deg, #2c1810 0%, #4a2c1a 100%);
      color: white;
      padding: 0 16px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }
    .header-brand { display: flex; align-items: center; gap: 10px; }
    .header-heart { font-size: 22px; color: #c9a030; line-height: 1; }
    .header-names { font-size: 17px; font-weight: 700; letter-spacing: 0.3px; }
    .header-sub   { font-size: 11px; color: rgba(255,255,255,0.65); margin-top: 1px; }

    #lang-btn {
      background: rgba(255,255,255,0.13);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 5px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    #lang-btn:hover { background: rgba(255,255,255,0.22); }

    /* ── Tab nav ─────────────────────────────────────────── */
    .tab-nav {
      display: flex;
      background: white;
      border-bottom: 2px solid #e5e7eb;
      position: sticky;
      top: 60px;
      z-index: 99;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    }
    .tab-btn {
      flex: 1;
      padding: 9px 4px 8px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 11px;
      color: #9ca3af;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      font-family: inherit;
    }
    .tab-btn .ti { font-size: 17px; }
    .tab-btn.active { color: #7a3ea3; border-bottom-color: #7a3ea3; font-weight: 700; }
    .tab-btn:hover:not(.active) { color: #6b7280; background: #f9fafb; }

    /* ── Main layout ─────────────────────────────────────── */
    main { max-width: 820px; margin: 0 auto; padding: 16px; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

    /* ── Tab headings ────────────────────────────────────── */
    .tab-title    { font-size: 18px; font-weight: 700; color: #2c1810; margin-bottom: 2px; }
    .tab-subtitle { font-size: 12px; color: #8B6E52; margin-bottom: 14px; }

    /* ── Legend ──────────────────────────────────────────── */
    .legend {
      display: flex; flex-wrap: wrap; gap: 6px 12px;
      margin-bottom: 16px; padding: 10px 14px;
      background: white; border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      border: 1px solid #f0ece7;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #4b5563; }
    .legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

    /* ── Event card (Tab 1 calendar) ─────────────────────── */
    .event-card {
      border-radius: 8px;
      padding: 9px 11px;
      border-left: 4px solid;
      display: grid;
      grid-template-columns: 62px 1fr;
      gap: 10px;
      align-items: start;
      transition: box-shadow 0.15s;
    }
    .event-card.is-wedding {
      border-width: 2px;
      border-left-width: 4px;
      box-shadow: 0 2px 12px rgba(122,62,163,0.18);
    }
    .event-time  { font-size: 10.5px; font-weight: 700; color: #374151; padding-top: 2px; line-height: 1.35; }
    .event-title { font-size: 13px; font-weight: 600; }
    .event-desc  { font-size: 12px; color: #6b7280; margin-top: 3px; line-height: 1.45; }
    .event-flag  { font-size: 11px; color: #92400e; font-style: italic; margin-top: 5px;
                   background: #fef9ec; padding: 4px 8px; border-radius: 4px; line-height: 1.4; }
    .event-who   { font-size: 11px; color: #8B6E52; margin-top: 3px; font-style: italic; }

    /* ── Day card (Tab 1) ────────────────────────────────── */
    .day-card {
      background: white; border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      overflow: hidden; margin-bottom: 18px;
    }
    .day-card.is-highlight {
      box-shadow: 0 4px 20px rgba(201,160,48,0.25);
      border: 2px solid #c9a030;
    }
    .day-header { padding: 12px 14px; background: #f5f3ef; border-bottom: 1px solid #e8e4de; }
    .day-card.is-highlight .day-header {
      background: linear-gradient(135deg, #3a1f10, #6a2e90);
      color: white;
    }
    .day-name  { font-size: 15px; font-weight: 700; }
    .day-theme { font-size: 12px; color: #6b7280; margin-top: 2px; }
    .day-card.is-highlight .day-theme { color: rgba(255,255,255,0.75); }
    .day-events { padding: 11px; display: flex; flex-direction: column; gap: 7px; }

    /* ── Timeline (Tab 2) ────────────────────────────────── */
    .section-sep {
      font-size: 11px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: #8B6E52;
      padding: 18px 0 8px; border-bottom: 1px solid #e5e7eb;
      margin-bottom: 10px;
    }
    .tl-events { display: flex; flex-direction: column; gap: 8px; margin-bottom: 4px; }
    .tl-row { display: grid; grid-template-columns: 68px 1fr; gap: 10px; align-items: start; }
    .tl-time { font-size: 10.5px; font-weight: 700; color: #374151; text-align: right; padding-top: 11px; line-height: 1.35; }
    .tl-card { border-radius: 8px; padding: 10px 12px; border-left: 4px solid; }
    .tl-card.is-wedding {
      border-width: 2px; border-left-width: 4px;
      box-shadow: 0 2px 12px rgba(122,62,163,0.18);
    }

    /* ── Photographer note ───────────────────────────────── */
    .photo-note {
      background: #e8f0fa; border: 1px solid #3a6ea8; border-radius: 8px;
      padding: 8px 12px; font-size: 11.5px; color: #1e3a5f;
      margin: 10px 0 6px; display: flex; align-items: center; gap: 8px;
    }

    /* ── Ceremony (Tab 3) ────────────────────────────────── */
    .progress-wrap { margin-bottom: 20px; }
    .progress-bar {
      display: flex; height: 26px; border-radius: 13px; overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }
    .progress-seg {
      display: flex; align-items: center; justify-content: center;
      font-size: 9.5px; color: white; font-weight: 700;
      overflow: hidden; white-space: nowrap; padding: 0 4px;
    }
    .progress-labels {
      display: flex; gap: 0; margin-top: 6px;
    }
    .progress-label-item {
      font-size: 10px; color: #6b7280; text-align: center; padding: 0 2px;
      white-space: nowrap; overflow: hidden;
    }

    .step-row { display: grid; grid-template-columns: 40px 1fr; gap: 12px; margin-bottom: 10px; align-items: start; }
    .step-num {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 700; color: white; flex-shrink: 0;
      margin-top: 2px;
    }
    .step-num.is-heart {
      background: linear-gradient(135deg, #c9a030, #e8b84b) !important;
      font-size: 19px;
    }
    .step-body { border-radius: 8px; padding: 10px 12px; border-left: 4px solid; }
    .step-body.is-heart-card {
      border-width: 2px; border-left-width: 4px;
      box-shadow: 0 2px 12px rgba(122,62,163,0.18);
    }
    .step-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .step-title    { font-size: 13px; font-weight: 600; }
    .step-duration { font-size: 11px; font-weight: 700; flex-shrink: 0; padding-top: 1px; }
    .step-who  { font-size: 11px; color: #8B6E52; margin-top: 3px; font-style: italic; }
    .step-desc { font-size: 12px; color: #4b5563; margin-top: 5px; line-height: 1.45; }
    .step-flag { font-size: 11px; color: #92400e; font-style: italic; margin-top: 6px;
                 background: #fef9ec; padding: 4px 8px; border-radius: 4px; }

    /* ── Info box ────────────────────────────────────────── */
    .info-box {
      background: linear-gradient(135deg, #fdf8e8, #fff);
      border: 1px solid #c9a030; border-radius: 12px;
      padding: 14px 16px; margin-top: 20px;
      font-size: 12.5px; color: #4b5563; line-height: 1.7;
    }
    .info-box-title { font-size: 13px; font-weight: 700; color: #8B6E52; margin-bottom: 8px; }
    .info-item { padding: 3px 0; border-bottom: 1px solid #f0ece7; }
    .info-item:last-child { border-bottom: none; }
    .info-item::before { content: '📌 '; }

    /* ── Ceremony total ──────────────────────────────────── */
    .ceremony-total {
      background: linear-gradient(135deg, #f3eafa, #fff);
      border: 1px solid #7a3ea3; border-radius: 10px;
      padding: 14px 16px; margin-top: 20px;
      text-align: center; font-size: 14px; font-weight: 600; color: #7a3ea3;
    }

    /* ── Desktop grid for day cards ──────────────────────── */
    @media (min-width: 640px) {
      .days-grid {
        display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
      }
      .day-card { margin-bottom: 0; }
      .day-card.is-highlight { grid-column: 1 / -1; }
      main { padding: 20px; }
      .event-card { grid-template-columns: 72px 1fr; }
      .tl-row { grid-template-columns: 76px 1fr; }
    }

    @media (min-width: 800px) {
      .tab-btn { font-size: 13px; }
      .tab-btn .ti { font-size: 19px; }
    }

    /* ── Handbook (Tab 4) ───────────────────────────────── */
    .hb-section {
      background: white; border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      overflow: hidden; margin-bottom: 14px;
    }
    .hb-section-header {
      padding: 12px 16px;
      background: linear-gradient(135deg, #f5f0eb, #fff);
      border-bottom: 1px solid #e8e4de;
      display: flex; align-items: center; gap: 10px;
    }
    .hb-icon { font-size: 20px; line-height: 1; }
    .hb-title { font-size: 14px; font-weight: 700; color: #2c1810; }
    .hb-body { padding: 14px 16px; font-size: 13px; color: #374151; line-height: 1.65; }
    .hb-p { margin-bottom: 10px; }
    .hb-p:last-child { margin-bottom: 0; }
    .hb-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .hb-list li { padding-left: 16px; position: relative; }
    .hb-list li::before { content: '•'; position: absolute; left: 2px; color: #8B6E52; }
    .hb-table { width: 100%; border-collapse: collapse; }
    .hb-table tr { border-bottom: 1px solid #f0ece7; }
    .hb-table tr:last-child { border-bottom: none; }
    .hb-table td { padding: 7px 6px; vertical-align: top; font-size: 12.5px; }
    .hb-table td:first-child { width: 38%; color: #8B6E52; font-weight: 600; white-space: nowrap; padding-right: 10px; }
    .hb-place { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #f0ece7; }
    .hb-place:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
    .hb-place-name { font-weight: 700; color: #2c1810; margin-bottom: 2px; }
    .hb-place-desc { font-size: 12px; color: #6b7280; line-height: 1.45; }
    .hb-contacts { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .hb-contact-card {
      background: #faf8f5; border: 1px solid #e8e4de; border-radius: 8px;
      padding: 10px 12px;
    }
    .hb-contact-label { font-size: 10.5px; color: #8B6E52; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
    .hb-contact-value { font-size: 13px; font-weight: 600; color: #1a1209; }
    .hb-safety-note {
      background: #fff3e8; border-left: 4px solid #c05c00; border-radius: 0 8px 8px 0;
      padding: 10px 12px; margin: 10px 0; font-size: 12px; color: #7c3d00;
    }
    .hb-welcome {
      font-style: italic; font-size: 13.5px; color: #374151; line-height: 1.75;
      border-left: 3px solid #c9a030; padding-left: 14px; margin: 6px 0;
    }

    /* ── Print (ceremony) ────────────────────────────────── */
    @media print {
      #site-header, .tab-nav, #tab-0, #tab-1, #tab-3 { display: none !important; }
      #tab-2 { display: block !important; }
      body { background: white; }
      .step-body, .step-num { box-shadow: none !important; }
    }
  </style>
</head>
<body>

<header id="site-header">
  <div class="header-brand">
    <span class="header-heart">♡</span>
    <div>
      <div class="header-names">Alice &amp; Lucas</div>
      <div class="header-sub" id="hdr-date">30 Juin 2026 · Golden, BC</div>
    </div>
  </div>
  <button id="lang-btn" onclick="toggleLang()">EN</button>
</header>

<nav class="tab-nav">
  <button class="tab-btn active" onclick="switchTab(0)">
    <span class="ti">📅</span>
    <span id="tl0">Programme</span>
  </button>
  <button class="tab-btn" onclick="switchTab(1)">
    <span class="ti">💒</span>
    <span id="tl1">Jour J</span>
  </button>
  <button class="tab-btn" onclick="switchTab(2)">
    <span class="ti">💍</span>
    <span id="tl2">Cérémonie</span>
  </button>
  <button class="tab-btn" onclick="switchTab(3)">
    <span class="ti">📖</span>
    <span id="tl3">Livret</span>
  </button>
</nav>

<main>
  <section id="tab-0" class="tab-pane active"></section>
  <section id="tab-1" class="tab-pane"></section>
  <section id="tab-2" class="tab-pane"></section>
  <section id="tab-3" class="tab-pane"></section>
</main>

<script>
// ── State ──────────────────────────────────────────────────
let lang = 'fr';
let DATA = {};

// ── Type → colour config (3 categories) ───────────────────
// Rouge = Incontournable · Orange = Optionnel · Vert = Info pratique
const T = {
  mandatory: { c: '#c0392b', bg: '#fef2f2' },
  wedding:   { c: '#c0392b', bg: '#fef2f2', wed: true },
  photo:     { c: '#c0392b', bg: '#fef2f2' },
  optional:  { c: '#c05c00', bg: '#fff3e8' },
  break:     { c: '#c05c00', bg: '#fff3e8' },
  free:      { c: '#c05c00', bg: '#fff3e8' },
  meal:      { c: '#c05c00', bg: '#fff3e8' },
  travel:    { c: '#2e7d4f', bg: '#eaf5ee' },
  info:      { c: '#2e7d4f', bg: '#eaf5ee' },
  warn:      { c: '#2e7d4f', bg: '#eaf5ee' },
  // Ceremony step types
  entry:     { c: '#c0392b', bg: '#fef2f2' },
  word:      { c: '#2e7d4f', bg: '#eaf5ee' },
  speech:    { c: '#c05c00', bg: '#fff3e8' },
  vows:      { c: '#c0392b', bg: '#fef2f2' },
  rings:     { c: '#c9a030', bg: '#fdf8e8' },
  close:     { c: '#c0392b', bg: '#fef2f2' },
};
function tc(type) { return T[type] || T.break; }

function tx(obj) { return obj ? (obj[lang] || obj.fr || '') : ''; }

// ── Legend ─────────────────────────────────────────────────
const LEGEND = [
  { type: 'mandatory', fr: 'Incontournable', en: 'Mandatory' },
  { type: 'optional',  fr: 'Optionnel',      en: 'Optional'  },
  { type: 'info',      fr: 'Info pratique',  en: 'Practical Info' },
];
function renderLegend() {
  return `<div class="legend">${LEGEND.map(item => {
    const cfg = tc(item.type);
    return `<div class="legend-item">
      <div class="legend-dot" style="background:${cfg.c}"></div>
      <span>${item[lang]}</span>
    </div>`;
  }).join('')}</div>`;
}

// ── Tab 1 — Full Week ──────────────────────────────────────
function renderWeek() {
  const cal = DATA.cal;
  let html = `<div class="tab-title">${tx(cal.title)}</div>
    <div class="tab-subtitle">${tx(cal.subtitle)}</div>
    ${renderLegend()}
    <div class="days-grid">`;

  for (const day of cal.days) {
    const hl = day.highlight;
    html += `<div class="day-card${hl ? ' is-highlight' : ''}">
      <div class="day-header">
        <div class="day-name">${tx(day.name)}</div>
        <div class="day-theme">${tx(day.theme)}</div>
      </div>
      <div class="day-events">
        ${day.events.map(ev => renderEventCard(ev)).join('')}
      </div>
    </div>`;
  }

  html += `</div>`;

  // Info box — split by · into items
  const rawInfo = tx(cal.info_box);
  const items = rawInfo.split('·').map(s => s.trim()).filter(Boolean);
  html += `<div class="info-box">
    <div class="info-box-title">${lang === 'fr' ? 'Infos pratiques' : 'Practical Info'}</div>
    ${items.map(i => `<div class="info-item">${i}</div>`).join('')}
  </div>`;

  return html;
}

function renderEventCard(ev) {
  const cfg = tc(ev.type);
  const wed = ev.type === 'wedding';
  const time = lang === 'fr' ? (ev.time || '') : (ev.time_en || ev.time || '');
  const desc = ev.desc ? tx(ev.desc) : null;
  const flag = ev.flag ? tx(ev.flag) : null;
  return `<div class="event-card${wed ? ' is-wedding' : ''}"
      style="border-color:${cfg.c}; background:${cfg.bg};">
    <div class="event-time">${time}</div>
    <div>
      <div class="event-title">${tx(ev.title)}</div>
      ${desc ? `<div class="event-desc">${desc}</div>` : ''}
      ${flag ? `<div class="event-flag">${flag}</div>` : ''}
    </div>
  </div>`;
}

// ── Tab 2 — Wedding Day ────────────────────────────────────
function renderWeddingDay() {
  const wed = DATA.wed;
  let html = `<div class="tab-title">${tx(wed.title)}</div>
    <div class="tab-subtitle">${tx(wed.subtitle)}</div>
    <div class="photo-note">
      📷 ${lang === 'fr'
        ? 'Forfait photographe 4h : <strong>17h00 → 21h00</strong> · Photos de préparatifs + cérémonie + cocktail + golden hour'
        : 'Photographer 4-hour package: <strong>5:00 PM → 9:00 PM</strong> · Prep shots + ceremony + cocktail + golden hour'}
    </div>
    ${renderLegend()}`;

  for (const section of wed.sections) {
    html += `<div class="section-sep">${tx(section.label)}</div>
      <div class="tl-events">
        ${section.events.map(ev => renderTimelineEvent(ev)).join('')}
      </div>`;
  }
  return html;
}

function renderTimelineEvent(ev) {
  const cfg = tc(ev.type);
  const wed = ev.type === 'wedding';
  const time = lang === 'fr' ? (ev.time || '') : (ev.time_en || ev.time || '');
  const who  = ev.who  ? tx(ev.who)  : null;
  const desc = ev.desc ? tx(ev.desc) : null;
  const flag = ev.flag ? tx(ev.flag) : null;
  const wedStyle = wed ? `border-width:2px; border-left-width:4px; box-shadow:0 2px 12px rgba(122,62,163,0.18);` : '';
  return `<div class="tl-row">
    <div class="tl-time">${time}</div>
    <div class="tl-card${wed ? ' is-wedding' : ''}"
        style="border-color:${cfg.c}; background:${cfg.bg}; ${wedStyle}">
      <div class="event-title">${tx(ev.title)}</div>
      ${who  ? `<div class="event-who">${who}</div>`   : ''}
      ${desc ? `<div class="event-desc">${desc}</div>` : ''}
      ${flag ? `<div class="event-flag">${flag}</div>` : ''}
    </div>
  </div>`;
}

// ── Tab 3 — Ceremony ───────────────────────────────────────
function renderCeremony() {
  const cer = DATA.cer;
  // Progress bar
  const segs = cer.progress_segments;
  const barHtml = segs.map(s =>
    `<div class="progress-seg" style="background:${s.color}; width:${s.width};" title="${tx(s.label)}">${tx(s.label)}</div>`
  ).join('');

  let html = `<div class="tab-title">${tx(cer.title)}</div>
    <div class="tab-subtitle">${tx(cer.subtitle)}</div>
    <div class="progress-wrap">
      <div class="progress-bar">${barHtml}</div>
    </div>`;

  for (const step of cer.steps) {
    html += renderStep(step);
  }

  html += `<div class="ceremony-total">
    ${tx(cer.total_label)} : ${tx(cer.total_duration)} &nbsp;·&nbsp; ${tx(cer.fit_label)}
  </div>`;

  return html;
}

function renderStep(step) {
  const cfg = tc(step.type);
  const isHeart = step.num === '♡';
  const desc = step.desc ? tx(step.desc) : null;
  const flag = step.flag ? tx(step.flag) : null;
  const numStyle = isHeart ? '' : `background:${cfg.c}`;
  const cardClass = `step-body${isHeart ? ' is-heart-card' : ''}`;
  const cardStyle = `border-color:${cfg.c}; background:${cfg.bg};${isHeart ? ` border-width:2px; border-left-width:4px; box-shadow:0 2px 12px rgba(122,62,163,0.18);` : ''}`;
  return `<div class="step-row">
    <div class="step-num${isHeart ? ' is-heart' : ''}" style="${numStyle}">${step.num}</div>
    <div class="${cardClass}" style="${cardStyle}">
      <div class="step-head">
        <div class="step-title">${tx(step.title)}</div>
        <div class="step-duration" style="color:${cfg.c}">${step.duration}</div>
      </div>

      ${desc ? `<div class="step-desc">${desc}</div>` : ''}
      ${flag ? `<div class="step-flag">${flag}</div>` : ''}
    </div>
  </div>`;
}

function switchTab(n) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === n));
  document.querySelectorAll('.tab-pane').forEach((p, i) => p.classList.toggle('active', i === n));
}

function toggleLang() {
  lang = lang === 'fr' ? 'en' : 'fr';
  document.getElementById('lang-btn').textContent = lang === 'fr' ? 'EN' : 'FR';
  document.documentElement.lang = lang;
  renderAll();
}

function renderAll() {
  document.getElementById('tab-0').innerHTML = renderWeek();
  document.getElementById('tab-1').innerHTML = renderWeddingDay();
  document.getElementById('tab-2').innerHTML = renderCeremony();
  document.getElementById('tab-3').innerHTML = renderHandbook();

  const labels = lang === 'fr'
    ? ['Programme', 'Jour J', 'Cérémonie', 'Livret']
    : ['Full Week', 'Wedding Day', 'Ceremony', 'Handbook'];
  labels.forEach((l, i) => { document.getElementById(`tl${i}`).textContent = l; });

  document.getElementById('hdr-date').textContent =
    lang === 'fr' ? '30 Juin 2026 · Golden, BC' : 'June 30, 2026 · Golden, BC';
}

    DATA = { cal: CAL, wed: WED, cer: CER };
